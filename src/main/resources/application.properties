spring.datasource.url=jdbc:mysql://localhost:3306/Removebg
spring.datasource.username=root
spring.datasource.password=${DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server.port=${PORT:8080}

# Clerk Configuration
clerk.issuer=${CLERK_ISSUER}
clerk.jwks-url=${CLERK_JWKS_URL}
clerk.webhook.secret=${WEBHOOK_SECRET}

#clipdrop configuration
clipdrop.apikey=${CLIPDROP_API}

#razorpay configuration
razorpay.key.id=${RAZORPAY_API}
razorpay.key.secret=${RAZORPAY_SECRET}